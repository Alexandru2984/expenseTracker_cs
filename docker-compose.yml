services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./ExpenseTracker.Api
    restart: unless-stopped
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── EF migrations (run once before first api start, then remove) ─────────────
  migrate:
    build:
      context: ./ExpenseTracker.Api
    env_file: .env
    entrypoint: ["/app/efbundle"]
    command: ["--connection", "${ConnectionStrings__DefaultConnection}"]
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate
    restart: "no"

  # ── UI build (init container — populates frontend_dist volume then exits) ─────
  ui-builder:
    build:
      context: ./expense-tracker-ui
    environment:
      DEST: /srv
    volumes:
      - frontend_dist:/srv
    restart: "no"

  # ── Caddy (HTTPS termination + reverse proxy + static files) ─────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      ui-builder:
        condition: service_completed_successfully
      api:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_dist:
  caddy_data:
  caddy_config:
