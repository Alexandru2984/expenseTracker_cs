services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./ExpenseTracker.Api
    restart: unless-stopped
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - dp_keys:/home/appuser/.aspnet/DataProtection-Keys
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── EF migrations (run once before first api start, then remove) ─────────────
  migrate:
    build:
      context: ./ExpenseTracker.Api
      target: bundle
    env_file: .env
    entrypoint: ["/efbundle"]
    command: ["--connection", "${ConnectionStrings__DefaultConnection}"]
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate
    restart: "no"

  # ── UI build (builds frontend assets into ./frontend_dist on host) ───────────
  ui-builder:
    build:
      context: ./expense-tracker-ui
    environment:
      DEST: /srv
    volumes:
      - ./frontend_dist:/srv
    restart: "no"

volumes:
  postgres_data:
  dp_keys:
